name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GO_VERSION: "1.26.4"
  GOFUMPT_VERSION: "v0.10.0"
  GOVULNCHECK_VERSION: "v1.5.0"
  STATICCHECK_VERSION: "v0.7.0"

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --workspace --all-features

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.96
        run: |
          rustup toolchain install 1.96 --profile minimal
          rustup default 1.96

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Check MSRV
        run: cargo check --workspace --all-features

  go:
    name: Go checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.sum

      - name: Module tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Format
        run: |
          go run mvdan.cc/gofumpt@${GOFUMPT_VERSION} -w .
          git diff --exit-code -- .

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION} ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

  python:
    name: Python checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

      - name: Ruff
        run: python -m ruff check .

      - name: Format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy src

      - name: Build
        run: python -m build

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
